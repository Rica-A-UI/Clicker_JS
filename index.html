<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game - Classic Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="upper_btn">
        <button id="btn1">★</button>
        <button id="btn2">⚒</button>
    </header>

    <main>
        <article>
            <section id="score">
                <h1 id="scoreText">0</h1>
                <img id="for_pressing" src="https://media.istockphoto.com/id/1401691137/vector/hammer-and-sickle-high-quality-vector-illustration.jpg?s=612x612&w=0&k=20&c=TQ1KN7O-JEEU_i73vVdBCw_qDB9SdGTIEZEa-qCzhpY=" alt="Click Me!">
            </section>

            <section id="full_section">
                <h1>Upgrades</h1>
                <section id="upgrades">
                    <div class="upgrade-card">
                        <h2>Manual Labor</h2>
                        <p>Cost: 15</p>
                    </div>
                    <div class="upgrade-card">
                        <h2>Small Factory</h2>
                        <p>Cost: 100</p>
                    </div>
                    <div class="upgrade-card">
                        <h2>Industrialization</h2>
                        <p>Cost: 500</p>
                    </div>
                    <div class="upgrade-card">
                        <h2>Five Year Plan</h2>
                        <p>Cost: 2500</p>
                    </div>
                </section>
            </section>
        </article>
    </main>

    <footer>
        <p>&#169; Izveidots kā joks</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
